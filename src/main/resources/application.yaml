spring:
  application:
    name: cronai-gen-ms
  mongodb:
    username: ${MONGO_USERNAME}
    password: ${MONGO_PASSWORD}
    host: ${MONGO_HOST}
    database: gen
    representation:
      uuid: standard
  cloud:
      binders:
        rabbit_infra:
          type: rabbit
          environment:
            spring:
              rabbitmq:
                host: ${RABBIT_HOST}
                port: ${RABBIT_PORT}
                username: ${RABBIT_USERNAME}
                password: ${RABBIT_PASSWORD}
                virtual-host: /

server:
  servlet:
    context-path: /svc

jobrunr:
  database:
    database-name: ${spring.mongodb.database}
  background-job-server:
    enabled: true
    thread-type: VirtualThreads
  dashboard:
    enabled: true
    port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true