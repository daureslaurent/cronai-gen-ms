name: Build Maven + Push Docker
on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup JDK 25
        uses: actions/setup-java@v4.8.0
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Build with Maven
        env:
          USERNAME: ${{github.actor}}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B package -s $GITHUB_WORKSPACE/settings.xml --file pom.xml

      - name: Set image name
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set APP_NAME
        run: |
          APP_NAME="${GITHUB_REPOSITORY##*/}"
          echo "APP_NAME=${APP_NAME,,}" >> $GITHUB_ENV

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and publish a Docker image for ${{ github.repository }}
        uses: macbre/push-to-ghcr@master
        with:
          image_tag: ${{ env.SHORT_SHA }}
          image_name: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}


      - name: Trigger infra update
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.INFRA_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/daureslaurent/cronai-gen-ms/dispatches \
            -d '{
              "event_type": "helm",
              "client_payload": {
                "branch": "'"${{ github.ref  }}"'",
                "name": "'"${{ env.APP_NAME  }}"'",
                "image": "'"${{ env.IMAGE_NAME  }}"'",
                "tag": "'"${{ env.SHORT_SHA }}"'"
              }
            }'